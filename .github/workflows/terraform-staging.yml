name: '🚀 Terraform - Staging'

on:
  push:
    branches:
      - staging
    paths:
      - 'environments/staging/**'
      - 'modules/**'
      - '.github/workflows/terraform-staging.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deployment reason'
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  TF_VERSION: '1.5.7'
  WORKING_DIR: './environments/staging'
  ENVIRONMENT: 'staging'
  AWS_REGION: 'us-east-1'

jobs:
  terraform-plan:
    name: '🔍 Plan Staging Deployment'
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create_issue.outputs.issue_number }}
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Create terraform.tfvars for CI
        run: |
          cat > terraform.tfvars << EOF
          environment = "staging"
          aws_region  = "us-east-1"
          key_name    = null
          EOF
      
      - name: 📦 Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_STAGING }}" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE_STAGING }}" \
            -backend-config="encrypt=true"
      
      - name: ✅ Terraform Validate
        run: terraform validate
      
      - name: 📊 Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -input=false -var-file="terraform.tfvars" -out=tfplan
      
      - name: 📤 Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 3
      
      - name: 📝 Save Plan Output
        run: terraform show -no-color tfplan > plan_output.txt
      
      - name: 📤 Upload Plan Output
        uses: actions/upload-artifact@v4
        with:
          name: staging-plan-output
          path: ${{ env.WORKING_DIR }}/plan_output.txt
          retention-days: 3
      
      - name: 💬 Create Approval Issue
        id: create_issue
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            
            const issueBody = `
            ## 🚨 Staging Deployment Requires Approval
            
            **Environment:** Staging
            **Branch:** ${{ github.ref_name }}
            **Triggered by:** ${{ github.actor }}
            **Reason:** ${{ github.event.inputs.reason || 'Push to staging branch' }}
            
            ### 📋 Terraform Plan Summary
            
            \`\`\`hcl
            ${planOutput.substring(0, 3000)}
            \`\`\`
            
            ### ✅ To Approve
            **Comment \`/approve\` on this issue** to proceed with deployment.
            
            ### ❌ To Cancel
            Close this issue or comment \`/cancel\` to cancel deployment.
            
            _Note: You're approving your own deployment (single-user mode)_
            `;
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Staging] Deployment Approval Required - ${new Date().toISOString()}`,
              body: issueBody,
              labels: ['deployment', 'staging', 'needs-approval']
            });
            
            console.log(`✅ Created approval issue #${issue.data.number}`);
            return issue.data.number;
      
      - name: ⏳ Wait for Approval
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.create_issue.outputs.result }};
            let approved = false;
            let timeout = 60; // 60 minutes timeout
            let checked = 0;
            
            console.log(`⏳ Waiting for approval on issue #${issueNumber}...`);
            
            while (!approved && checked < timeout) {
              await new Promise(r => setTimeout(r, 60000)); // Wait 1 minute
              checked++;
              
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              
              for (const comment of comments.data) {
                if (comment.body.includes('/approve')) {
                  approved = true;
                  console.log(`✅ Deployment approved by: ${comment.user.login}`);
                  break;
                }
                if (comment.body.includes('/cancel')) {
                  console.log('❌ Deployment cancelled');
                  process.exit(0);
                }
              }
              
              console.log(`⏳ Waiting for approval... (${checked}/${timeout} minutes)`);
            }
            
            if (!approved) {
              core.setFailed('Approval timeout - deployment cancelled');
            }

  terraform-apply:
    name: '🚀 Apply Staging Deployment'
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: success()
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Create terraform.tfvars for CI
        run: |
          cat > terraform.tfvars << EOF
          environment = "staging"
          aws_region  = "us-east-1"
          key_name    = null
          EOF
      
      - name: 📥 Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-tfplan
          path: ${{ env.WORKING_DIR }}
      
      - name: 📦 Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_STAGING }}" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE_STAGING }}" \
            -backend-config="encrypt=true"
      
      - name: 🚀 Terraform Apply
        run: terraform apply -auto-approve tfplan
      
      - name: 🧪 Post-Deployment Health Check
        run: |
          echo "Waiting 60 seconds for services to start..."
          sleep 60
          PUBLIC_IP=$(terraform output -raw instance_public_ip 2>/dev/null || echo "")
          if [ -n "$PUBLIC_IP" ]; then
            echo "Testing web server at http://$PUBLIC_IP"
            curl -f http://$PUBLIC_IP || echo "Health check warning"
          fi
      
      - name: 📝 Output Summary
        run: |
          echo "## ✅ Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Deployed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
